<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>railhead</title>
    <script>
      // No-FOUC: apply the persisted/system theme before React mounts.
      // Mirrors src/stores/theme.ts (Zustand `persist`, localStorage key "theme").
      try {
        const stored = JSON.parse(localStorage.getItem("theme") || "null");
        const theme =
          stored?.state?.theme ||
          (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        if (theme === "dark") document.documentElement.classList.add("dark");
      } catch {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
